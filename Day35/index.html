<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Gallery</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="slider">
        <!-- Slide 1 -->
        <section class="slide active effect1">
            <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=1600&q=80" alt="YOU SMILE">
            <div class="overlay"></div>

            <div class="content">
                <div class="top">
                    <span>HOW TO MAKE THIS</span>
                    <h2>GLASS EFFECT</h2>
                    <button id="next">Swipe For More →</button>
                </div>

                <div class="glassText">
                    <h1>YOU</h1>
                    <h1>SMILE</h1>
                </div>
            </div>
        </section>

        <!-- Slide 2 -->
        <section class="slide effect2">
            <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=1600&q=80" alt="DREAM">
            <div class="overlay"></div>

            <div class="content">
                <div class="top">
                    <span>LIQUID GLASS</span>
                    <h2>PREMIUM EFFECT</h2>
                    <button id="next2">Swipe For More →</button>
                </div>

                <div class="glassText">
                    <h1>DREAM</h1>
                </div>
            </div>
        </section>

        <!-- Slide 3 -->
        <section class="slide effect3">
            <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=1600&q=80" alt="CREATE">
            <div class="overlay"></div>

            <div class="content">
                <div class="top">
                    <span>NEON GLASS</span>
                    <h2>MODERN DESIGN</h2>
                    <button id="next3">Swipe For More →</button>
                </div>

                <div class="glassText">
                    <h1>CREATE</h1>
                </div>
            </div>
        </section>

        <!-- Slide 4 -->
        <section class="slide effect4">
            <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=1600&q=80" alt="INSPIRE">
            <div class="overlay"></div>

            <div class="content">
                <div class="top">
                    <span>CRYSTAL GLASS</span>
                    <h2>FUTURE UI</h2>
                    <button id="prev">← Previous</button>
                </div>

                <div class="glassText">
                    <h1>INSPIRE</h1>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
