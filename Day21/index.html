<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debounce Example</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4d5887, #4a3064a4);
        }

        .container{
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2{
            margin-bottom: 20px;
            color: #333;
        }

        input{
            width: 300px;
            padding: 12px 18px;
            border: 2px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input:focus{
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102,126,234,0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Search</h2>
        <input id="search" type="text" placeholder="Type something...">
    </div>

    <script src="script.js"></script>

</body>
</html>
