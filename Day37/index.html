<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Loaders</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <!-- Loader 1 -->
        <div class="card">
            <h2>1</h2>
            <div class="loader loader1"></div>
        </div>

        <!-- Loader 2 -->
        <div class="card">
            <h2>2</h2>
            <div class="loader loader2">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <!-- Loader 3 -->
        <div class="card">
            <h2>3</h2>
            <div class="loader loader3">
                <div class="arrow"></div>
            </div>
        </div>

        <!-- Loader 4 -->
        <div class="card">
            <h2>4</h2>
            <div class="loader loader4"></div>
        </div>

        <!-- Loader 5 -->
        <div class="card">
            <h2>5</h2>
            <div class="loader loader5">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <!-- Loader 6 -->
        <div class="card">
            <h2>6</h2>
            <div class="loader loader6">
                <div class="diamond"></div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
