<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

<main class="container">
    <!-- Left Panel -->
    <section class="left-panel">

        <h1><i class="fa-solid fa-skull"></i>Password Generator</h1>

        <div class="password-box">
            <input type="password" id="password" placeholder="Generate Password" readonly>
            <button id="toggleBtn" title="Show Password"><i class="fa-regular fa-eye"></i></button>
            <button id="copyBtn" title="Copy Password"><i class="fa-regular fa-copy"></i></button>
        </div>

        <div class="setting">

            <div class="setting-header">
                <label for="length">Password Length</label>
                <span id="lengthValue">16</span>
            </div>

            <input type="range" id="length" min="4" max="32" value="16">

        </div>

        <div class="options">

            <label class="option-card">
                <input type="checkbox" id="uppercase" checked>
                <div>
                    <h4>Uppercase Letters</h4>
                    <p>A-Z</p>
                </div>
            </label>

            <label class="option-card">
                <input type="checkbox" id="lowercase" checked>
                <div>
                    <h4>Lowercase Letters</h4>
                    <p>a-z</p>
                </div>
            </label>

            <label class="option-card">
                <input type="checkbox" id="numbers" checked>
                <div>
                    <h4>Numbers</h4>
                    <p>0-9</p>
                </div>
            </label>

            <label class="option-card">
                <input type="checkbox" id="symbols">
                <div>
                    <h4>Symbols</h4>
                    <p>!@#$%</p>
                </div>
            </label>

        </div>

        <div class="strength">
            <div class="strength-header">
                <span>Password Strength</span>
                <span id="strengthText">Strong</span>
            </div>
            <div class="strength-bar">
                <div id="strengthIndicator"></div>
            </div>
        </div>

        <button id="generateBtn">
            <i class="fa-solid fa-bolt"></i>
            Generate Password
        </button>

        <div class="footer">
            <div class="line"></div>
            <i class="fa-solid fa-skull"></i>
            <div class="line"></div>
        </div>

    </section>

    <!-- Right Panel -->
    <aside class="right-panel">

        <div class="history-header">
            <h2>Recent Passwords</h2>
            <button id="clearHistoryBtn">
                <i class="fa-solid fa-trash"></i>
                Clear
            </button>
        </div>

        <ul id="historyList"></ul>

    </aside>

</main>

<div id="toast">Password Copied!</div>

<script src="script.js"></script>

</body>
</html>
